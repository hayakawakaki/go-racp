# Admin is implicit on every gated entry
# * is any authenticated user
# Leaving a route blank will allow any user to access it
#
# Valid Roles: ["*", "Event", "Moderator", "Enforcer"]
# Valid Requires:
#  Unrestricted: Not permanently banned, Not temporarily banned, Email Verified and Exists in Database
# Declare Custom Roles in config.yml under UserRoles:


Account:
  View:
    Roles: ["*"]
  ChangePassword:
    Roles: ["*"]
    Requires: ["Unrestricted"]
  ChangeEmail:
    Roles: ["*"]
    Requires: ["Unrestricted"]

Tickets:
  View:
    Roles: ["*"]
  Open:
    Roles: ["*"]
  Reply:
    Roles: ["*"]
  Manage:
    Roles: ["Moderator", "Enforcer"]
    Requires: ["Unrestricted"]

News:
  Manage:
    Roles: ["Moderator"]
    Requires: ["Unrestricted"]
