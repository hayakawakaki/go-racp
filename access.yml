# Every registered route must have an entry here. Missing entries panic at startup.
# Admin is implicit on every gated entry and cannot be listed.
# * means any authenticated user.
# Public means no auth at all (anonymous) - cannot be combined with other roles or with Requires: [Unrestricted].
#
# Valid Roles: ["Public", "*", "Event", "Moderator", "Enforcer"]
# Valid Requires:
#  Unrestricted: Not permanently banned, Not temporarily banned, Email Verified and Exists in Database
# Declare Custom Roles in config.yml under UserRoles:


Home:
  View:
    Roles: ["Public"]

Account:
  View:
    Roles: ["*"]
  ChangePassword:
    Roles: ["*"]
    Requires: ["Unrestricted"]
  ChangeEmail:
    Roles: ["*"]
    Requires: ["Unrestricted"]
  Login:
    Roles: ["Public"]
  Register:
    Roles: ["Public"]
  Logout:
    Roles: ["Public"]
  ForgotPassword:
    Roles: ["Public"]
  ResetPassword:
    Roles: ["Public"]
  Verify:
    Roles: ["Public"]
  VerifyEmailChange:
    Roles: ["Public"]

Tickets:
  View:
    Roles: ["*"]
  Open:
    Roles: ["*"]
  Reply:
    Roles: ["*"]
  Manage:
    Roles: ["Moderator", "Enforcer"]
    Requires: ["Unrestricted"]

News:
  View:
    Roles: ["Public"]
  Manage:
    Roles: ["Moderator"]
    Requires: ["Unrestricted"]

Character:
  View:
    Roles: ["*"]
  Reset:
    Roles: ["*"]
    Requires: ["Unrestricted"]

Item:
  View:
    Roles: ["*"]
  API:
    Roles: ["Public"]

Mob:
  View:
    Roles: ["*"]
  API:
    Roles: ["Public"]
