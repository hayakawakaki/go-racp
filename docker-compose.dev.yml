services:
  app:
    build:
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      - MODE=development
      - DB_MAIN_URL=dbuser:dbpass@tcp(db:3306)/main
      - DB_LOG_URL=dbuser:dbpass@tcp(db:3306)/log
      - DB_MAX_OPEN_CONN=8
      - DB_MAX_IDLE_CONN=4
    volumes:
      - .:/app
      - /app/tmp
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  db:
    image: mariadb:lts
    ports:
      - "3306:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=root
      - MARIADB_USER=dbuser
      - MARIADB_PASSWORD=dbpass
      - MARIADB_DATABASE=main
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro
      - ./migrations:/migrations:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mariadb-data:

networks:
  app-network:
    driver: bridge
