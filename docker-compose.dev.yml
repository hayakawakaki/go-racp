services:
  app:
    build:
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      - MODE=development
      - APP_URL=http://localhost:8080
      - DB_MAIN_URL=dbuser:dbpass@tcp(mock-ra-db:3306)/main
      - DB_LOG_URL=dbuser:dbpass@tcp(mock-ra-db:3306)/log
      - DB_CP_URL=postgres://dbuser:dbpass@db:5432/cp?sslmode=disable
      - DB_CP_TEST_URL=postgres://dbuser:dbpass@db:5432/cp_test?sslmode=disable
      - DB_MAX_OPEN_CONN=8
      - DB_MAX_IDLE_CONN=4
      - DB_CP_MAX_OPEN_CONN=8
      - DB_CP_MAX_IDLE_CONN=4
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
    volumes:
      - .:/app
      - /app/tmp
    depends_on:
      db:
        condition: service_healthy
      mock-ra-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=dbuser
      - POSTGRES_PASSWORD=dbpass
      - POSTGRES_DB=cp
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbuser -d cp"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network

  mock-ra-db:
    image: mariadb:lts
    ports:
      - "3306:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=root
      - MARIADB_USER=dbuser
      - MARIADB_PASSWORD=dbpass
      - MARIADB_DATABASE=main
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network

  mailpit:
    image: axllent/mailpit:v1.20
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mariadb-data:
  postgres-data:

networks:
  app-network:
    driver: bridge
