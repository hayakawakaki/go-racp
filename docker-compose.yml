services:
  app:
    build:
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:8080"
    environment:
      - MODE=production
      - APP_PORT=${APP_PORT:-8080}
      - APP_URL=${APP_URL:?APP_URL is required}
      - CSRF_SECRET=${CSRF_SECRET:?CSRF_SECRET is required}
      - DB_MAIN_URL=${DB_USER}:${DB_PASSWORD}@tcp(${DB_HOST}:${DB_PORT:-3306})/${DB_MAIN_NAME}
      - DB_LOG_URL=${DB_USER}:${DB_PASSWORD}@tcp(${DB_HOST}:${DB_PORT:-3306})/${DB_LOG_NAME}
      - DB_MAX_OPEN_CONN=${DB_MAX_OPEN_CONN:-8}
      - DB_MAX_IDLE_CONN=${DB_MAX_IDLE_CONN:-4}
      - DB_CP_URL=postgres://${DB_CP_USER}:${DB_CP_PASSWORD}@${DB_CP_HOST}:${DB_CP_PORT:-5432}/${DB_CP_NAME}?sslmode=${DB_CP_SSLMODE:-disable}
      - DB_CP_MAX_OPEN_CONN=${DB_CP_MAX_OPEN_CONN:-8}
      - DB_CP_MAX_IDLE_CONN=${DB_CP_MAX_IDLE_CONN:-4}
      - SMTP_HOST=smtp-relay
      - SMTP_PORT=587
      - APP_DATA_DIR=${APP_DATA_DIR:-/data}
      - SERVER_HOST=${SERVER_HOST:-127.0.0.1}
      - LOGIN_PORT=${LOGIN_PORT:-6900}
      - CHAR_PORT=${CHAR_PORT:-6121}
      - MAP_PORT=${MAP_PORT:-5121}
      - WEB_PORT=${WEB_PORT:-8888}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID:-}
      - PAYPAL_SECRET=${PAYPAL_SECRET:-}
      - PAYPAL_WEBHOOK_ID=${PAYPAL_WEBHOOK_ID:-}
      - NOWPAYMENTS_API_KEY=${NOWPAYMENTS_API_KEY:-}
      - NOWPAYMENTS_IPN_SECRET=${NOWPAYMENTS_IPN_SECRET:-}
    volumes:
      - ${APP_DATA_DIR:-/data}:${APP_DATA_DIR:-/data}:ro
      - ./static/item:/home/app/static/item:ro
      - ./static/mob:/home/app/static/mob:ro
      - ./static/collection:/home/app/static/collection:ro
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      smtp-relay:
        condition: service_started
    networks:
      - app-network

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=${DB_CP_USER}
      - POSTGRES_PASSWORD=${DB_CP_PASSWORD}
      - POSTGRES_DB=${DB_CP_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_CP_USER} -d ${DB_CP_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network

  smtp-relay:
    image: boky/postfix:5.1.0-alpine
    environment:
      - HOSTNAME=${MAIL_HOSTNAME:?MAIL_HOSTNAME is required}
      - ALLOWED_SENDER_DOMAINS=${SMTP_ALLOWED_SENDER_DOMAINS:?SMTP_ALLOWED_SENDER_DOMAINS is required}
      - DKIM_AUTOGENERATE=true
    volumes:
      - dkim-keys:/etc/opendkim/keys
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  dkim-keys:
  postgres-data:
