services:
  app:
    build:
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - MODE=production
      - DB_MAIN_URL=${DB_USER}:${DB_PASSWORD}@tcp(${DB_HOST}:${DB_PORT:-3306})/${DB_MAIN_NAME}
      - DB_LOG_URL=${DB_USER}:${DB_PASSWORD}@tcp(${DB_HOST}:${DB_PORT:-3306})/${DB_LOG_NAME}
      - DB_MAX_OPEN_CONN=${DB_MAX_OPEN_CONN:-8}
      - DB_MAX_IDLE_CONN=${DB_MAX_IDLE_CONN:-4}
      - DB_CP_URL=postgres://${DB_CP_USER}:${DB_CP_PASSWORD}@${DB_CP_HOST}:${DB_CP_PORT:-5432}/${DB_CP_NAME}?sslmode=${DB_CP_SSLMODE:-require}
      - DB_CP_MAX_OPEN_CONN=${DB_CP_MAX_OPEN_CONN:-8}
      - DB_CP_MAX_IDLE_CONN=${DB_CP_MAX_IDLE_CONN:-4}
      - SMTP_HOST=smtp-relay
      - SMTP_PORT=587
    restart: unless-stopped
    depends_on:
      - smtp-relay
    networks:
      - app-network

  smtp-relay:
    image: boky/postfix:5.1.0-alpine
    environment:
      - HOSTNAME=${MAIL_HOSTNAME:?MAIL_HOSTNAME is required}
      - ALLOWED_SENDER_DOMAINS=${SMTP_ALLOWED_SENDER_DOMAINS:?SMTP_ALLOWED_SENDER_DOMAINS is required}
      - DKIM_AUTOGENERATE=true
    volumes:
      - dkim-keys:/etc/opendkim/keys
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  dkim-keys:
