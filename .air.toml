root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  pre_cmd = [
    "go tool templ generate",
    "tailwindcss -i ./static/css/tailwind.css -o ./static/css/app.css",
  ]
  cmd = "go build -o ./tmp/racp.exe ./cmd"
  bin = "./tmp/racp.exe"
  include_ext = ["go", "templ", "yml"]
  exclude_dir = ["tmp", "docs", "docker", ".git", ".claude", "node_modules", "static/vendor", "testdata", "data"]
  exclude_regex = ["_test\\.go$", "_templ\\.go$"]
  delay = 500
  kill_delay = "500ms"
  send_interrupt = true
  log = "build-errors.log"
  poll = true
  poll_interval = 3000

[log]
  time = true

[color]
  build = "yellow"
  main = "cyan"
  runner = "green"
  watcher = "magenta"

[misc]
  clean_on_exit = true
