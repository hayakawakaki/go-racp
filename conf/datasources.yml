# Item and Mob databases.
# File locations come from the APP_DATA_DIR env var.
# Files: paths relative to APP_DATA_DIR, or absolute paths.
# Rathena's footer import is not resolved on the parser. Use the direct path to the yml files.
ItemDB:
  YAML:
    Files: ["item_db_equip.yml", "item_db_etc.yml", "item_db_usable.yml"]
  Lua:
    Files: ["iteminfo.lub"]

MobDB:
  YAML:
    Files: ["mob_db.yml"]
