# Every registered route must have an entry here. Missing entries panic at startup.
#
# The Roles token is the verification stance:
#   Public:   no auth at all (anonymous). Cannot combine with other roles or Requires: [Unrestricted].
#   Member:   any authenticated user, verified or not.
#   Verified: any authenticated user who has verified their email.
#   <role>:   a specific operator-defined role (implies verified). e.g. Moderator, Enforcer, Event.
#   Admin:    listed alone, marks an admin-only-hidden route.
#
# Valid Roles: ["Public", "Member", "Verified", "Admin", "Event", "Moderator", "Enforcer"]
# Valid Requires:
#  Unrestricted: Not permanently banned and not temporarily banned.
#  APIKey: Requires generated api key to access. (Public Routes)
#
# Entry shape: either a bare role list, or an object with:
#   Roles: Valid Roles. (Required)
#   Requires:  Currently only "Unrestricted". (Optional)
#   RateLimit: Rate limit setting. (Optional)
#     RatePerMinute: 6
#     Burst: 3
#
# Custom Roles in conf/roles.yml

Account:
  View:
    Roles: ["Verified"]
  ChangePassword:
    Roles: ["Verified"]
    Requires: ["Unrestricted"]
  ChangeEmail:
    Roles: ["Verified"]
    Requires: ["Unrestricted"]
  Withdraw:
    Roles: ["Verified"]
    Requires: ["Unrestricted"]
    RateLimit:
      RatePerMinute: 6
      Burst: 3
  Login:
    Roles: ["Public"]
    RateLimit:
      RatePerMinute: 10
      Burst: 5
  Register:
    Roles: ["Public"]
    RateLimit:
      RatePerMinute: 5
      Burst: 3
  Logout:
    Roles: ["Public"]
  ForgotPassword:
    Roles: ["Public"]
    RateLimit:
      RatePerMinute: 3
      Burst: 2
  ResetPassword:
    Roles: ["Public"]
    RateLimit:
      RatePerMinute: 5
      Burst: 3
  Verify:
    Roles: ["Public"]
    RateLimit:
      RatePerMinute: 5
      Burst: 3
  VerifyEmailChange:
    Roles: ["Public"]

Tickets:
  View:
    Roles: ["Verified"]
  Open:
    Roles: ["Verified"]
    RateLimit:
      RatePerMinute: 5
      Burst: 3
  Reply:
    Roles: ["Verified"]
  Manage:
    Roles: ["Moderator", "Enforcer"]
    Requires: ["Unrestricted"]

News:
  View:
    Roles: ["Public"]
  Manage:
    Roles: ["Moderator"]
    Requires: ["Unrestricted"]

Notification:
  View:
    Roles: ["Member"]

Character:
  View:
    Roles: ["Verified"]
  Reset:
    Roles: ["Verified"]
    Requires: ["Unrestricted"]

Guild:
  View:
    Roles: ["Admin"]

Item:
  View:
    Roles: ["Verified"]
  API:
    Roles: ["Public"]
    Requires: ["APIKey"]

Mob:
  View:
    Roles: ["Verified"]
  API:
    Roles: ["Public"]
    Requires: ["APIKey"]

Market:
  View:
    Roles: ["Verified"]
    Requires: ["Unrestricted"]
  Trade:
    Roles: ["Verified"]
    Requires: ["Unrestricted"]

Users:
  View:
    Roles: ["Enforcer"]
  Ban:
    Roles: ["Enforcer"]
    Requires: ["Unrestricted"]
  Unban:
    Roles: ["Enforcer"]
    Requires: ["Unrestricted"]
  SetRole:
    Roles: ["Admin"]

Vendor:
  View:
    Roles: ["Verified"]
    Requires: ["Unrestricted"]

Metric:
  API:
    Roles: ["Public"]
    Requires: ["APIKey"]

Store:
  View:
    Roles: ["Verified"]
    Requires: ["Unrestricted"]
  Checkout:
    Roles: ["Verified"]
    Requires: ["Unrestricted"]
    RateLimit:
      RatePerMinute: 6
      Burst: 3
  History:
    Roles: ["Verified"]
    Requires: ["Unrestricted"]

Webhooks:
  Stripe:
    Roles: ["Public"]
  Paypal:
    Roles: ["Public"]
  Crypto:
    Roles: ["Public"]
