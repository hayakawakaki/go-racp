# Every registered route must have an entry here. Missing entries panic at startup.
# Admin is implicit on every gated entry. It may only be listed by itself
# (Roles: ["Admin"]) to mark a non-Admin.*-tagged route as admin-only-hidden;
# it cannot be combined with other roles or with Requires: ["Unrestricted"].
# * means any authenticated user.
# Public means no auth at all (anonymous) - cannot be combined with other roles or with Requires: [Unrestricted].
#
# Valid Roles: ["Public", "*", "Admin", "Event", "Moderator", "Enforcer"]
# Valid Requires:
#  Unrestricted: Not permanently banned, Not temporarily banned, Email Verified and Exists in Database
#
# Entry shape: either a bare role list, or an object with:
#   Roles:     required, list of role names (or ["Public"] / ["Admin"] / ["*"])
#   Requires:  optional, list of policy tags. Currently only "Unrestricted".
#   RateLimit: optional, { RatePerMinute, Burst }. When set, all routes under the tag
#              share one token bucket. The bucket keys by session.UserID when Roles
#              excludes "Public", otherwise by client IP.
#
# Declare Custom Roles in roles.yml under UserRoles:

Account:
  View:
    Roles: ["*"]
  ChangePassword:
    Roles: ["*"]
    Requires: ["Unrestricted"]
  ChangeEmail:
    Roles: ["*"]
    Requires: ["Unrestricted"]
  Login:
    Roles: ["Public"]
    RateLimit:
      RatePerMinute: 10
      Burst: 5
  Register:
    Roles: ["Public"]
    RateLimit:
      RatePerMinute: 5
      Burst: 3
  Logout:
    Roles: ["Public"]
  ForgotPassword:
    Roles: ["Public"]
    RateLimit:
      RatePerMinute: 3
      Burst: 2
  ResetPassword:
    Roles: ["Public"]
    RateLimit:
      RatePerMinute: 5
      Burst: 3
  Verify:
    Roles: ["Public"]
    RateLimit:
      RatePerMinute: 5
      Burst: 3
  VerifyEmailChange:
    Roles: ["Public"]

Tickets:
  View:
    Roles: ["*"]
  Open:
    Roles: ["*"]
    RateLimit:
      RatePerMinute: 5
      Burst: 3
  Reply:
    Roles: ["*"]
  Manage:
    Roles: ["Moderator", "Enforcer"]
    Requires: ["Unrestricted"]

News:
  View:
    Roles: ["Public"]
  Manage:
    Roles: ["Moderator"]
    Requires: ["Unrestricted"]

Character:
  View:
    Roles: ["*"]
  Reset:
    Roles: ["*"]
    Requires: ["Unrestricted"]

Guild:
  View:
    Roles: ["Admin"]

Item:
  View:
    Roles: ["*"]
  API:
    Roles: ["Public"]

Mob:
  View:
    Roles: ["*"]
  API:
    Roles: ["Public"]

Users:
  View:
    Roles: ["Admin"]
  Ban:
    Roles: ["Moderator", "Enforcer"]
    Requires: ["Unrestricted"]
  Unban:
    Roles: ["Moderator", "Enforcer"]
    Requires: ["Unrestricted"]
  SetRole:
    Roles: ["Admin"]

Vendor:
  View:
    Roles: ["*"]
    Requires: ["Unrestricted"]

Metric:
  API:
    Roles: ["Public"]
