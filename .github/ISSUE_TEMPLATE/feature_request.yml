name: Feature Request
description: Suggest a new feature or an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. This project values DX and UX over feature parity, so please explain the problem you are trying to solve, not only the solution you have in mind.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I searched existing issues and this has not been requested.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve. Who runs into it and when.
      placeholder: As a server owner I cannot do X, which makes Y harder.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you would like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches or workarounds you have thought about.
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: Area
      description: Which part of the panel does this touch.
      options:
        - Admin panel
        - Player-facing pages
        - Theming
        - Database or migrations
        - Configuration or deployment
        - Other (describe in proposal)
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, links, or anything else that helps explain the request.
    validations:
      required: false
