name: Bug Report
description: Report something that is broken or behaving incorrectly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in the sections below so the issue can be reproduced quickly.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checks
      options:
        - label: I searched existing issues and this has not been reported.
          required: true
        - label: I am running the latest version or a recent commit.
          required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of what the bug is.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps so the behavior can be triggered reliably.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Observe '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages, screenshots, or server logs if available.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: The release tag or git commit hash you are running.
      placeholder: v0.1.0 or cbdfd1e
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: How are you running it
      options:
        - Docker dev stack
        - Single binary
        - Other (describe in summary)
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Fill in what is relevant to the bug.
      value: |
        - OS:
        - Browser and version:
        - Postgres version:
        - MariaDB version:
        - rAthena version or commit:
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output. This is automatically formatted into code, so no backticks are needed.
      render: shell
    validations:
      required: false
