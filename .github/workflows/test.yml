name: Test

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Run tests
        run: go test ./...

  integration:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:lts
        env:
          MARIADB_ROOT_PASSWORD: testpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: cp
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d cp"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Create databases
        run: |
          mysql -h 127.0.0.1 -P 3306 -uroot -ptestpassword -e "CREATE DATABASE main; CREATE DATABASE log;"
      - name: Load rAthena seed
        run: |
          mysql -h 127.0.0.1 -P 3306 -uroot -ptestpassword main < docker/mariadb/init/ra-main.sql
          mysql -h 127.0.0.1 -P 3306 -uroot -ptestpassword log < docker/mariadb/init/ra-log.sql
      - name: Apply CP migrations
        env:
          DB_MAIN_URL: root:testpassword@tcp(127.0.0.1:3306)/main
        run: go tool goose -dir migrations mysql "$DB_MAIN_URL" up
      - name: Run integration tests
        env:
          APP_URL: http://localhost:8080
          DB_MAIN_URL: root:testpassword@tcp(127.0.0.1:3306)/main
          DB_LOG_URL: root:testpassword@tcp(127.0.0.1:3306)/log
          DB_CP_URL: postgres://postgres:testpassword@127.0.0.1:5432/cp?sslmode=disable
          SMTP_HOST: localhost
        run: go test -tags=integration ./...
