name: Test

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Run tests
        run: go test ./...

  integration:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:lts
        env:
          MARIADB_ROOT_PASSWORD: testpassword
          MARIADB_DATABASE: db_main
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Create log database
        run: mysql -h 127.0.0.1 -P 3306 -uroot -ptestpassword -e "CREATE DATABASE db_log;"
      - name: Run integration tests
        env:
          DB_MAIN_URL: root:testpassword@tcp(127.0.0.1:3306)/db_main
          DB_LOG_URL: root:testpassword@tcp(127.0.0.1:3306)/db_log
        run: go test -tags=integration ./...
