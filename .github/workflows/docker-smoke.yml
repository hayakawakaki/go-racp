name: Docker Smoke

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:lts
        env:
          MARIADB_ROOT_PASSWORD: testpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: cp
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d cp"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    steps:
      - uses: actions/checkout@v6

      - name: Create databases and app user
        run: |
          mysql -h 127.0.0.1 -P 3306 -uroot -ptestpassword \
            -e "CREATE DATABASE main; CREATE DATABASE log;
                CREATE USER 'cpuser'@'%' IDENTIFIED BY 'cppassword';
                GRANT ALL PRIVILEGES ON main.* TO 'cpuser'@'%';
                GRANT ALL PRIVILEGES ON log.* TO 'cpuser'@'%';
                FLUSH PRIVILEGES;"

      - name: Load rAthena seed
        run: |
          mysql -h 127.0.0.1 -P 3306 -uroot -ptestpassword main \
            < docker/mariadb/init/ra-main.sql
          mysql -h 127.0.0.1 -P 3306 -uroot -ptestpassword log  \
            < docker/mariadb/init/ra-log.sql

      - name: Build image
        run: docker build -t go-racp:pr .

      - name: Run container
        run: |
          docker run -d --name app \
            --network=host \
            -e APP_PORT=8080 \
            -e APP_URL=http://localhost:8080 \
            -e MODE=production \
            -e DB_MAIN_URL="cpuser:cppassword@tcp(127.0.0.1:3306)/main" \
            -e DB_LOG_URL="cpuser:cppassword@tcp(127.0.0.1:3306)/log" \
            -e DB_CP_URL="postgres://postgres:testpassword@127.0.0.1:5432/cp?sslmode=disable" \
            -e CSRF_SECRET=ZGV2LW9ubHktZHVtbXktY3NyZi1zZWNyZXQtcmVwbGFjZS1pbi1wcm9k \
            -e SMTP_HOST=localhost \
            go-racp:pr

      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect --format '{{.State.Health.Status}}' app)
            echo "attempt $i: $status"
            if [ "$status" = "healthy" ]; then exit 0; fi
            if [ "$status" = "unhealthy" ]; then break; fi
            sleep 2
          done
          echo "container did not become healthy"
          exit 1

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== docker inspect ==="
          docker inspect app || true
          echo "=== docker logs ==="
          docker logs app || true
