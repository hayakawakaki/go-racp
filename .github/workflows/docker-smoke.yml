name: Docker Smoke

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:lts
        env:
          MARIADB_ROOT_PASSWORD: testpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    steps:
      - uses: actions/checkout@v6

      - name: Create databases
        run: |
          mysql -h 127.0.0.1 -P 3306 -uroot -ptestpassword \
            -e "CREATE DATABASE main; CREATE DATABASE log;"

      - name: Load rAthena seed
        run: |
          mysql -h 127.0.0.1 -P 3306 -uroot -ptestpassword main \
            < docker/mariadb/init/ra-main.sql
          mysql -h 127.0.0.1 -P 3306 -uroot -ptestpassword log  \
            < docker/mariadb/init/ra-log.sql

      - name: Apply CP migrations
        run: |
          for f in migrations/*.sql; do
            echo "Applying $f"
            mysql -h 127.0.0.1 -P 3306 -uroot -ptestpassword main < "$f"
          done

      - name: Build image
        run: docker build -t go-racp:pr .

      - name: Run container
        run: |
          docker run -d --name app \
            --network=host \
            -e APP_PORT=8080 \
            -e MODE=production \
            -e DB_MAIN_URL="root:testpassword@tcp(127.0.0.1:3306)/main" \
            -e DB_LOG_URL="root:testpassword@tcp(127.0.0.1:3306)/log" \
            -e SMTP_HOST=localhost \
            go-racp:pr

      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect --format '{{.State.Health.Status}}' app)
            echo "attempt $i: $status"
            if [ "$status" = "healthy" ]; then exit 0; fi
            if [ "$status" = "unhealthy" ]; then break; fi
            sleep 2
          done
          echo "container did not become healthy"
          exit 1

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== docker inspect ==="
          docker inspect app || true
          echo "=== docker logs ==="
          docker logs app || true
