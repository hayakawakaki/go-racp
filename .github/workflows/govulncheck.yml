name: Vulnerability Check

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: "1.26"
          check-latest: true
