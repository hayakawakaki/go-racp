# UI Related Stuffs
GeneralConfig:
  ServerName: "GoCP"
  Timezone: "UTC"

# Session/Token Lifetime
TTL:
  Session: "24h"
  Verification: "30m"
  PasswordReset: "1h"
  EmailChange: "24h"

# Action Cooldowns
Cooldown:
  VerificationResend: "60s"
  PasswordResetRequest: "30m"
  PasswordChange: "168h"
  EmailChangeRequest: "60s"
  EmailChange: "336h"

# Mail Stuffs
MailerConfig:
  FromAddress: "noreply@your-server.example"

# rAthena group_id values for each CP role (Admin is hardcoded to 99).
Group:
  Moderator: 20
  Enforcer: 10
  Event: 2
