# UI Related Stuffs
GeneralConfig:
  ServerName: "GoCP"
  Timezone: "UTC"

# Session/Token Lifetime
TTL:
  Session: "24h"
  Verification: "30m"
  PasswordReset: "1h"
  EmailChange: "24h"

# Action Cooldowns
Cooldown:
  VerificationResend: "60s"
  PasswordResetRequest: "30m"
  PasswordChange: "168h"
  EmailChangeRequest: "60s"
  EmailChange: "336h"
  TicketOpen: "30m"

# Mail Stuffs
MailerConfig:
  FromAddress: "noreply@your-server.example"

# Match your rathena group.yml for values for each CP role (Admin is hardcoded to 99).
UserRoles:
  Moderator: 20
  Enforcer: 10
  Event: 2
  #Vip: 5


# Ticketing related config
TicketLimits:
  MaxOpenPerPlayer: 5

TicketCategories:
  BugReport:
    Display: "Bug Report"
    Roles: ["Moderator", "Enforcer"]
  AccountHelp:
    Display: "Account Help"
    Roles: ["Moderator"]
  Donation:
    Display: "Donation"
    Roles: ["Moderator"]
  Other:
    Display: "Other"
    Roles: ["*"]

Tickets:
  StaffPollInterval: "30s"

NewsCategories:
  Announcement:
    Display: "Announcement"
  Update:
    Display: "Update"
  Event:
    Display: "Event"
  Patch:
    Display: "Patch Notes"
