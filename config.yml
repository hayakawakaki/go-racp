# UI Related Stuffs
GeneralConfig:
  ServerName: "GoCP"
  Timezone: "UTC"
  Gepard: false

# Authentication behavior
Auth:
  AllowTempBannedLogin: true

# Session/Token Lifetime
TTL:
  Session: "24h"
  Verification: "30m"
  PasswordReset: "1h"
  EmailChange: "24h"

# Action Cooldowns
Cooldown:
  VerificationResend: "60s"
  PasswordResetRequest: "30m"
  PasswordChange: "168h"
  EmailChangeRequest: "60s"
  EmailChange: "336h"
  TicketOpen: "30m"
  CharacterLookReset: "24h"
  CharacterLocationReset: "1h"

# Default save location used by /characters/{id}/location
DefaultLocation:
  Map: "prontera"
  X: 156
  Y: 191

# Mail Stuffs
MailerConfig:
  FromAddress: "noreply@your-server.example"

# Match your rathena group.yml for values for each CP role (Admin is hardcoded to 99).
UserRoles:
  Moderator: 20
  Enforcer: 10
  Event: 2
  #Vip: 5

# Ticketing related config
TicketLimits:
  MaxOpenPerPlayer: 5

TicketCategories:
  BugReport:
    Display: "Bug Report"
    Roles: ["Moderator", "Enforcer"]
  AccountHelp:
    Display: "Account Help"
    Roles: ["Moderator"]
  Donation:
    Display: "Donation"
    Roles: ["Moderator"]
  Other:
    Display: "Other"
    Roles: ["*"]

Tickets:
  StaffPollInterval: "30s"

# News related config
NewsCategories:
  Announcement:
    Display: "Announcement"
  Update:
    Display: "Update"
  Event:
    Display: "Event"
  Patch:
    Display: "Patch Notes"

# Item Database
# Relative paths resolve against the cp root. Absolute paths are followed as is.
# Rathena's footer import is not resolved on the parser. Use the direct path to the yml files.
#
# Path examples:
# Local Path
#   Path: "data/"
# Linux Absolute Path
#   Path: "/home/username/rathena/db/"
# Windows Absolute Path
#   Path: "C:\Users\user1\Desktop\rathena\db\"
ItemDB:
  YAML:
    Path: "data/"
    Files: ["item_db_equip.yml", "item_db_etc.yml", "item_db_usable.yml"]
  Lua:
    Path: "data/"
    Files: ["iteminfo.lub"]

MobDB:
  YAML:
    Path: "data/"
    Files: ["mob_db.yml"]

# Vendor polling cadence (clamped to [5s, 10m])
Vendor:
  PollInterval: "30s"

# Metrics polling (online clamped to [10s, 1h]; general clamped to [5m, 24h])
Metrics:
  OnlinePollInterval: "1m"
  GeneralPollInterval: "1h"
  PeakWindows: ["daily", "weekly", "monthly", "all_time"]
