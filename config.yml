# UI Related Stuffs
GeneralConfig:
  ServerName: "GoCP"
  Timezone: "UTC"

# Authentication behavior
Auth:
  AllowTempBannedLogin: true

# Session/Token Lifetime
TTL:
  Session: "24h"
  Verification: "30m"
  PasswordReset: "1h"
  EmailChange: "24h"

# Action Cooldowns
Cooldown:
  VerificationResend: "60s"
  PasswordResetRequest: "30m"
  PasswordChange: "168h"
  EmailChangeRequest: "60s"
  EmailChange: "336h"
  TicketOpen: "30m"
  CharacterLookReset: "24h"
  CharacterLocationReset: "1h"

# Default save location used by /characters/{id}/location
DefaultLocation:
  Map: "prontera"
  X: 156
  Y: 191

# Mail Stuffs
MailerConfig:
  FromAddress: "noreply@your-server.example"

# Match your rathena group.yml for values for each CP role (Admin is hardcoded to 99).
UserRoles:
  Moderator: 20
  Enforcer: 10
  Event: 2
  #Vip: 5

# Ticketing related config
TicketLimits:
  MaxOpenPerPlayer: 5

TicketCategories:
  BugReport:
    Display: "Bug Report"
    Roles: ["Moderator", "Enforcer"]
  AccountHelp:
    Display: "Account Help"
    Roles: ["Moderator"]
  Donation:
    Display: "Donation"
    Roles: ["Moderator"]
  Other:
    Display: "Other"
    Roles: ["*"]

Tickets:
  StaffPollInterval: "30s"

# News related config
NewsCategories:
  Announcement:
    Display: "Announcement"
  Update:
    Display: "Update"
  Event:
    Display: "Event"
  Patch:
    Display: "Patch Notes"

# Item Database
# Server-side YAML and client-side Lua usually live in different trees,
# so each group has its own `Path` prefix joined onto its `Files` entries.
# Relative paths resolve against the cp root. Absolute paths are honored as-is.
#
# Path examples:
#   Path: "data/"                          # → <cp root>/data/<file>
#   Path: "/home/username/rathena/db/"     # → /home/username/rathena/db/<file>
#   Path: ""                               # → files must be absolute or project-relative
ItemDB:
  YAML:
    Path: "data/"
    Files: ["item_db_equip.yml", "item_db_etc.yml", "item_db_usable.yml"]
  Lua:
    Path: "data/"
    Files: ["iteminfo.lub"]
